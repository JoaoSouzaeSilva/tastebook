name: Supabase Keepalive

on:
  schedule:
    - cron: '17 8 * * 1,4'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    environment: Production - tastebook
    permissions:
      actions: write
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Send heartbeat to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          KEEPALIVE_SOURCE: github-actions
        run: node scripts/supabase-keepalive.mjs

      # GitHub disables cron schedules after 60 days without repo activity.
      # Re-enabling the workflow on every run resets that timer so the
      # schedule can never be silently switched off while it is running.
      - name: Reset GitHub scheduled-workflow inactivity timer
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api -X PUT "repos/${{ github.repository }}/actions/workflows/supabase-keepalive.yml/enable"
